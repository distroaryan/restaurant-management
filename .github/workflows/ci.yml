name: CI – Integration & E2E Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Download dependencies
        run: go mod download

      - name: Run Integration Tests
        run: gotestsum --format testname -- -v ./internal/tests/integration/...
        env:
          # testcontainers spins up MongoDB automatically – no external env needed.
          # Add any extra env vars your integration tests require below.
          MONGO_URI: ""

      - name: Run E2E Tests
        run: gotestsum --format testname -- -v ./internal/tests/e2e/...
        env:
          MONGO_URI: ""
